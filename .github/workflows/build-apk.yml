name: Build Android APK (Java 21 & Node 22)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js 22 # الحل الجذري لمشكلة الصورة الأخيرة
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/cli@latest @capacitor/core@latest @capacitor/android@latest

      - name: Build Web Project
        run: |
          npm run build
          # ضمان وجود مجلد www ليتعرف عليه Capacitor
          mkdir -p www
          cp -r dist/* www/ 2>/dev/null || cp -r build/* www/ 2>/dev/null || true
          touch www/index.html

      - name: Initialize Capacitor
        run: |
          # إعداد ملف التكوين ليتوافق مع مجلد www
          echo '{"appId": "com.farmers.app", "appName": "Smart Poultry Farm Manager", "webDir": "www"}' > capacitor.config.json
          npx cap sync android

      - name: Configure Gradle & Fix Corrupt Files
        run: |
          cd android
          # استخدام إصدار Gradle 8.7 المتوافق تماماً مع Java 21
          gradle wrapper --gradle-version 8.7 --distribution-type all
          chmod +x gradlew
          # إعدادات التوافقية
          echo "kotlin.jvm.target=21" >> gradle.properties
          echo "org.gradle.java.home=/usr/lib/jvm/temurin-21-jdk-amd64" >> gradle.properties

      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Poultry-Farm-Final-Java21-Node22
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
