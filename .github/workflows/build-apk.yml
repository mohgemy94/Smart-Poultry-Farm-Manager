name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle' # إضافة خاصية الكاش لتسريع البناء وتجنب تلف الملفات

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build

      - name: Initialize and Sync Capacitor
        run: |
          # التأكد من وجود المجلدات الضرورية
          mkdir -p dist
          npx cap sync android

      - name: Setup Gradle
        # هذه الخطوة تضمن أن ملف gradlew قابل للتنفيذ وتحل مشكلة الملف المعطوب
        run: |
          cd android
          chmod +x gradlew
          # تنظيف أي بقايا تالفة قبل البدء
          ./gradlew clean

      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Smart-Poultry-Farm-Manager-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
