name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm install
          # تثبيت الأدوات اللازمة للـ Native
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Build Web Project
        run: |
          # بناء ملفات الويب (Vite)
          npm run build
          # التأكد من وجود مجلد dist (أو www حسب إعداداتك)
          mkdir -p dist

      - name: Create Capacitor Config
        run: |
          # إنشاء ملف الإعدادات برمجياً لضمان الدقة
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.mohamedgemy.poultrymanager",
            "appName": "Smart Poultry Farm Manager",
            "webDir": "dist",
            "server": {
              "androidScheme": "https"
            }
          }
          EOF

      - name: Initialize Android Project
        run: |
          # حذف مجلد android القديم إن وجد وتجنب التعارض مع Expo
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          # بناء نسخة Debug للتجربة السريعة
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Smart-Poultry-Manager-QA
          path: android/app/build/outputs/apk/debug/app-debug.apk
