name: Build Android APK (Node 24 & Java 21)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  # تفعيل استخدام Node 24 للأكشنز كما طلب التحذير
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js 24 # التحديث إلى الإصدار القادم المستقر
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/cli@latest @capacitor/core@latest @capacitor/android@latest

      - name: Build Web Project
        run: |
          npm run build
          mkdir -p www
          cp -r dist/* www/ 2>/dev/null || cp -r build/* www/ 2>/dev/null || true
          touch www/index.html

      - name: Initialize Capacitor
        run: |
          echo '{"appId": "com.farmers.app", "appName": "Smart Poultry Farm Manager", "webDir": "www"}' > capacitor.config.json
          npx cap sync android

      - name: Force Stable Gradle 8.5
        run: |
          cd android
          curl -L https://services.gradle.org/distributions/gradle-8.5-all.zip -o gradle-8.5-all.zip
          unzip -o gradle-8.5-all.zip -d gradle_stable
          export GRADLE_HOME=$PWD/gradle_stable/gradle-8.5
          export PATH=$GRADLE_HOME/bin:$PATH
          gradle wrapper --gradle-version 8.5 --distribution-type all
          chmod +x gradlew
          echo "kotlin.code.style=official" >> gradle.properties
          echo "kotlin.jvm.target=21" >> gradle.properties

      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xskip-metadata-version-check"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Smart-Poultry-Manager-Node24-Java21
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
