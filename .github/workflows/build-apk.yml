name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 1. [إضافة ضرورية]: إعداد بيئة Node.js لضمان عمل أوامر npm بشكل صحيح
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # يمكنك تغيير الرقم إذا كان مشروعك يتطلب إصداراً أقدم (مثل 18)

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Build Web Project
        run: npm run build

      # 2. [تعديل هام]: تم إضافة "|| true" لتجاهل الخطأ إذا كان Capacitor مُعداً مسبقاً
      - name: Initialize Capacitor
        run: |
          npx cap init Farmers com.farmers.app --web-dir dist || true
          npx cap add android || true

      - name: Sync Android
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # 3. [تعديل الاسم]: تغيير اسم المخرج ليكون معبراً عن محتواه الحقيقي (Debug وليس Release)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
