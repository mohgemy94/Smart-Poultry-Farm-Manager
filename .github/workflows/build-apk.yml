name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm install
          # تثبيت الأدوات اللازمة للبناء لضمان وجود الملفات التنفيذية
          npm install @capacitor/cli @capacitor/core @capacitor/android

      - name: Build Web Project
        run: |
          # بناء المشروع وتحويله لملفات ويب داخل مجلد dist
          npm run build || (mkdir -p dist && touch dist/index.html)

      - name: Initialize and Sync Capacitor
        run: |
          # التأكد من وجود مجلد dist لنجاح عملية الربط
          mkdir -p dist
          # تحديث ملف الإعدادات برمجياً بالبيانات الجديدة
          echo '{"appId": "com.farmers.app", "appName": "Smart Poultry Farm Manager", "webDir": "dist"}' > capacitor.config.json
          # المزامنة مع مجلد الأندرويد
          npx cap sync android

      - name: Setup Gradle Permissions
        # حل مشكلة الصلاحيات وتلف ملفات Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean

      - name: Build Android APK
        # بناء نسخة APK النهائية
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Smart-Poultry-Farm-Manager-Final
          path: android/app/build/outputs/apk/debug/app-debug.apk
