name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Build Web Project
        run: |
          npm run build || (mkdir -p dist && touch dist/index.html)

      - name: Initialize and Sync Capacitor
        run: |
          # تم تحديث appName إلى الاسم الجديد المطلوب
          echo '{"appId": "com.farmers.app", "appName": "Smart Poultry Farm Manager", "webDir": "dist"}' > capacitor.config.json
          npx cap add android || true
          npx cap sync android

      - name: Fix Kotlin Duplicate Classes
        run: |
          cd android/app
          echo "configurations.all {
              resolutionStrategy.eachDependency { DependencyResolveDetails details ->
                  if (details.requested.group == 'org.jetbrains.kotlin') {
                      details.useVersion '1.8.22'
                  }
              }
          }" >> build.gradle

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          # تم تحديث اسم الملف الناتج للتعرف عليه بسهولة في GitHub
          name: Smart-Poultry-Farm-Manager-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
