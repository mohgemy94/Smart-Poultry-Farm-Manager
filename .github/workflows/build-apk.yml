name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/cli @capacitor/core @capacitor/android

      - name: Build Web Project
        run: |
          # بناء الملفات والتأكد من إنشاء مجلد www ليراه Capacitor
          npm run build
          mkdir -p www
          # إذا كان مشروعك ينتج مجلد dist، سننقل محتواه إلى www
          cp -r dist/* www/ 2>/dev/null || cp -r build/* www/ 2>/dev/null || true
          # التأكد من وجود ملف index.html لمنع فشل المزامنة
          touch www/index.html

      - name: Initialize Capacitor
        run: |
          # إجبار Capacitor على قراءة مجلد www
          echo '{"appId": "com.farmers.app", "appName": "Smart Poultry Farm Manager", "webDir": "www"}' > capacitor.config.json
          npx cap sync android

      - name: Repair Gradle Wrapper
        # حل مشكلة Corrupt Jarfile بتحميل نسخة سليمة مباشرة
        run: |
          cd android
          gradle wrapper --gradle-version 8.2 --distribution-type all
          chmod +x gradlew

      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Poultry-Farm-Manager-Final-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Repair Gradle Wrapper
        # هذا الأمر سيقوم بتحميل نسخة جديدة وسليمة من الملف المعطوب مباشرة على السيرفر
        run: |
          cd android
          gradle wrapper --gradle-version 8.0 --distribution-type all

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Smart-Poultry-Farm-Final
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
