name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build

      - name: Capacitor Sync
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Generate App Icons
        run: |
          pip install Pillow
          python3 << 'EOF'
          from PIL import Image
          import os

          img = Image.open("assets/icon.png").convert("RGBA")

          sizes = {
            "android/app/src/main/res/mipmap-mdpi":    {"launcher": 48,  "foreground": 108},
            "android/app/src/main/res/mipmap-hdpi":    {"launcher": 72,  "foreground": 162},
            "android/app/src/main/res/mipmap-xhdpi":   {"launcher": 96,  "foreground": 216},
            "android/app/src/main/res/mipmap-xxhdpi":  {"launcher": 144, "foreground": 324},
            "android/app/src/main/res/mipmap-xxxhdpi": {"launcher": 192, "foreground": 432},
          }

          for folder, s in sizes.items():
            os.makedirs(folder, exist_ok=True)

            launcher = img.resize((s["launcher"], s["launcher"]), Image.LANCZOS)
            launcher.save(f"{folder}/ic_launcher.png", "PNG")
            launcher.save(f"{folder}/ic_launcher_round.png", "PNG")

            fg_size = s["foreground"]
            canvas = Image.new("RGBA", (fg_size, fg_size), (0, 0, 0, 0))
            content_size = int(fg_size * 0.70)
            img_resized = img.resize((content_size, content_size), Image.LANCZOS)
            offset = (fg_size - content_size) // 2
            canvas.paste(img_resized, (offset, offset), img_resized)
            canvas.save(f"{folder}/ic_launcher_foreground.png", "PNG")

            print(f"✅ {folder}")
          EOF

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Build Android APK
        run: |
          cd android
          gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Smart-Poultry-Farm-Manager-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk          npx cap add android || true
          npx cap sync android

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Build Android APK
        run: |
          cd android
          gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Smart-Poultry-Farm-Manager-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
